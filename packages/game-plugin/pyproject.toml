[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "game-plugin-oneshot"
version = "0.2.0"
description = "GAME SDK plugin for OneShot real-world AI agent tools"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "game-sdk>=0.1.5",
    "oneshot-python>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[project.urls]
Homepage = "https://oneshotagent.com"
Repository = "https://github.com/oneShotAgentSDK/game-plugin-oneshot"
Documentation = "https://docs.oneshotagent.com/sdk/overview"
